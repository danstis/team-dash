name: Template Initialization
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  init:
    runs-on: ubuntu-latest
    if: github.event.repository.name != 'base-template'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Initialize Template and Self-Destruct
        run: |
          YEAR=$(date +'%Y')
          REPO_NAME=$(basename -s .git `git config --get remote.origin.url`)
          REPO_DESCRIPTION=$(gh repo view --json description -q '.description // ""')
          sed -i "s/{{ YEAR }}/$YEAR/g" LICENSE
          sed -i "s/{{ REPO_NAME }}/$REPO_NAME/g" README.md
          sed -i "s/{{ REPO_DESCRIPTION }}/$REPO_DESCRIPTION/g" README.md
          git rm .github/workflows/template-init.yml
          grep -q 'template-source: danstis/base-template' CLAUDE.md 2>/dev/null && git rm CLAUDE.md || true
          grep -q 'template-source: danstis/base-template' AGENTS.md 2>/dev/null && git rm AGENTS.md || true
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add LICENSE README.md
          git commit -m "chore: initialize template and remove workflow"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
