sonar.projectKey=danstis_team-dash
sonar.organization=danstis

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=team-dash
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Exclude tests and other non-source paths from main source analysis
sonar.exclusions=tests/**, **/*.test.*, **/*.spec.*, **/coverage/**, **/dist/**, **/build/**, **/node_modules/**

# Test configuration
sonar.tests=tests
sonar.test.inclusions=**/*.test.*, **/*.spec.*
sonar.test.exclusions=**/node_modules/**