name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1f5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # Release-please generates `CHANGELOG.md` entries with `*` bullets and an
      # extra blank line after each version heading; Prettier's default markdown
      # config requires `-` bullets and a single blank line. Without this step
      # the first CI run on the release PR fails `format-check`, which blocks
      # the release.
      #
      # Rewriting `CHANGELOG.md` after release-please is the only release-please
      # input that we can use for this (release-please has no option for either
      # bullet character or heading spacing, and `.prettierignore` would silently
      # drop the whole changelog from format coverage). This step is a no-op when
      # release-please did not open a PR (no `${{ steps.release.outputs.release_pr }}`)
      # or when the CHANGELOG is already prettier-clean (no leftover release-please
      # diff), so re-running the workflow on the same `main` tip is idempotent.
      - name: Format CHANGELOG.md with Prettier
        if: steps.release.outputs.release_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.release.outputs.release_pr }}
        run: |
          set -euo pipefail

          # Resolve the PR's head branch (release-please pushes to a managed
          # branch such as `release-please--branches--main--components--team-dash`
          # and creates/updates the PR against `main`). Threading the PR number
          # via env avoids script-injection if a non-default release PR is ever
          # created.
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)

          if [ -z "$BRANCH" ]; then
            echo "::error::Could not resolve head branch for release PR #$PR_NUMBER; aborting."
            exit 1
          fi

          echo "Formatting CHANGELOG.md on branch '$BRANCH' (PR #$PR_NUMBER)."

          # Fetch the PR branch and check it out so `prettier --write` and the
          # follow-up commit land on the release-please branch, not `main`.
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          # Use the project's pinned Prettier so the formatting matches the
          # local `npm run format:check` job exactly.
          npx --no-install prettier --write CHANGELOG.md

          # If prettier produced no diff, the CHANGELOG was already clean (e.g.
          # because a previous run of this workflow already formatted it).
          # Skip the empty commit so the workflow remains idempotent.
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md is already prettier-clean; no follow-up commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit --message "chore(release): format CHANGELOG.md with prettier (BSOD-269)"
          git push
