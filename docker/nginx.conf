# nginx configuration for the Team Dash static build.
#
# Designed for the `nginxinc/nginx-unprivileged:1.30-alpine` runtime
# stage of `docker/Dockerfile`, which runs as the non-root `nginx` user
# and listens on port 8080. This file is loaded by the upstream image
# as `/etc/nginx/conf.d/default.conf` (the path that the image's main
# `nginx.conf` `include`s by default), so no further nginx config layer
# is required to make the SPA, service-worker, and cache-control
# behaviour below take effect.
#
# Behaviour implemented per Spec Kit task T012 (BSOD-140):
#
#   1. SPA fallback routing — any non-asset request that doesn't match a
#      real file is rewritten to `/index.html` so React Router 7's
#      client-side routing works on deep-links and page reloads.
#   2. Service-worker file served `Cache-Control: no-cache` — the
#      `/sw.js` file produced by `vite-plugin-pwa` / Workbox must never
#      be long-cached, otherwise PWA updates will not propagate to
#      installed clients (FR-087, research.md §10).
#   3. PWA manifest served `Cache-Control: no-cache` — `/manifest.webmanifest`
#      follows the same update-propagation rule as the service worker.
#   4. Hashed assets (`/assets/*`) served long-cache — Vite emits
#      filenames like `/assets/index-<hash>.js`; the filename changes
#      whenever the content does, so a one-year `max-age` is safe and
#      avoids revalidation traffic on repeat visits (Principle VIII —
#      performance).
#   5. The SPA shell and all non-asset responses are served
#      `Cache-Control: no-cache` so the browser always revalidates and
#      picks up the latest hashed-asset references — the hash-only
#      `assets/*` policy is only correct because the shell is
#      revalidated each load.
#
# NOTE on nginx `add_header` inheritance: nginx does not inherit
# `add_header` from the `server` block into a `location` block that
# defines its own headers (a well-known nginx gotcha). The
# `X-Content-Type-Options: nosniff` header is therefore repeated inside
# every Cache-Control-bearing `location` block rather than declared once
# at the server level.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Gzip text responses — Vite produces compressible JS/CSS/HTML/SVG
    # output and the app is served over local networks (self-hosted
    # container), so the trade-off is unambiguously favourable.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml;

    # ------------------------------------------------------------------
    # (1) Service worker — never long-cached, otherwise PWA updates
    # won't propagate to installed clients (FR-087).
    # ------------------------------------------------------------------
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # (2) PWA manifest — same update-propagation rule as the service
    # worker. The `types` directive maps the `.webmanifest` extension
    # to the standard PWA manifest MIME type, independent of whether
    # the bundled `/etc/nginx/mime.types` recognises it.
    # ------------------------------------------------------------------
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        types { application/manifest+json webmanifest; }
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # (3) Hashed assets emitted by Vite into `/assets/*` (filenames
    # embed a content hash). One-year `max-age` + `immutable` — the
    # filename changes whenever the content does, so this is safe and
    # avoids the revalidation round-trip on every repeat visit.
    # `access_log off` keeps the access log focused on navigation
    # requests rather than per-asset hits.
    # ------------------------------------------------------------------
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # (4) SPA fallback — any path that doesn't match a real file falls
    # through to `/index.html` so React Router 7's client-side routing
    # works on deep-links and page reloads. Non-asset responses are
    # served `no-cache` so the SPA shell (and any future non-asset
    # static file like `/favicon.ico` or `/robots.txt`) is always
    # revalidated. The `?` in the fallback is not needed here because
    # the rewrite target is a literal `/index.html`, not a regex
    # back-reference, but `try_files` is the supported idiom and the
    # rewrite loop is bounded by the leading `/`.
    # ------------------------------------------------------------------
    location / {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Defensive: deny accidental dotfile leaks from the document root
    # (e.g. `.git`, `.env`, `.dockerignore` copied by a future build
    # mistake). These should never exist under `/usr/share/nginx/html`,
    # but a deny-by-default stance is cheap and matches the
    # defence-in-depth posture required for the credential-handling
    # parts of the product (Principle IV).
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
